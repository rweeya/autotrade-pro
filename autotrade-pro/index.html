<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Trade Pro - TradingView Signals</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Orbitron', monospace; background: #000; overflow: hidden; height: 100vh; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .terminal { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; backdrop-filter: blur(5px); }
        .header { padding: 15px 30px; background: linear-gradient(135deg, rgba(139,0,255,0.3), rgba(0,255,255,0.1)); border-bottom: 1px solid rgba(0,255,255,0.5); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo h1 { font-family: 'Orbitron', monospace; font-size: 24px; background: linear-gradient(135deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(0,255,255,0.5); } to { text-shadow: 0 0 30px rgba(255,0,255,0.8); } }
        .live-badge { background: #ff00ff33; padding: 6px 15px; border-radius: 40px; border: 1px solid #ff00ff; font-size: 12px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .time-badge { background: #000000aa; padding: 6px 15px; border-radius: 40px; font-family: monospace; font-size: 12px; backdrop-filter: blur(5px); color: #00ffff; }
        .dashboard { flex: 1; padding: 15px 30px; display: flex; gap: 20px; flex-wrap: wrap; overflow: hidden; }
        .info-panel { flex: 0.8; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0,255,255,0.3); padding: 20px; min-width: 260px; overflow-y: auto; }
        .info-panel h3 { color: #00ffff; margin-bottom: 15px; font-size: 16px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; background: linear-gradient(135deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 10px; color: #aaa; margin-top: 5px; }
        .signals-panel { flex: 2; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(0,255,255,0.3); padding: 20px; min-width: 450px; display: flex; flex-direction: column; }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .filter-input { background: rgba(0,0,0,0.7); border: 1px solid #ff00ff; color: #fff; padding: 8px 12px; border-radius: 20px; flex: 1; }
        .filter-select { background: rgba(0,0,0,0.7); border: 1px solid #ff00ff; color: #00ffff; padding: 8px 12px; border-radius: 20px; cursor: pointer; }
        .timeframe-buttons { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tf-btn { background: rgba(0,0,0,0.5); border: 1px solid #ff00ff33; color: #aaa; padding: 4px 12px; border-radius: 20px; cursor: pointer; }
        .tf-btn.active { background: #ff00ff33; border-color: #ff00ff; color: #ff00ff; }
        .signals-container { flex: 1; overflow-y: auto; max-height: 450px; }
        .signal-card { background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(0,255,255,0.05)); border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 3px solid #ff00ff; cursor: pointer; transition: 0.2s; }
        .signal-card:hover { transform: translateX(5px); background: rgba(255,0,255,0.2); }
        .buy { background: #00ff88; color: #000; display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .sell { background: #ff4444; color: #fff; display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .footer { text-align: center; padding: 10px; font-size: 10px; color: #555; background: rgba(0,0,0,0.5); }
        @media (max-width: 768px) { .header, .dashboard { padding: 10px; } .info-panel, .signals-panel { min-width: 100%; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="terminal">
        <div class="header">
            <div class="logo"><h1>⚡ AUTO TRADE PRO ⚡</h1></div>
            <div class="status">
                <div class="live-badge">🟢 LIVE</div>
                <div class="time-badge" id="liveTime">--:--:--</div>
            </div>
        </div>
        <div class="dashboard">
            <div class="info-panel">
                <h3>📊 СТАТИСТИКА</h3>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="totalSignals">0</div><div class="stat-label">ВСЕГО</div></div>
                    <div class="stat-card"><div class="stat-value" id="buySignals">0</div><div class="stat-label">BUY</div></div>
                    <div class="stat-card"><div class="stat-value" id="sellSignals">0</div><div class="stat-label">SELL</div></div>
                    <div class="stat-card"><div class="stat-value" id="accuracy">—</div><div class="stat-label">ТОЧНОСТЬ</div></div>
                </div>
            </div>
            <div class="signals-panel">
                <div class="filter-row">
                    <input type="text" id="searchFilter" class="filter-input" placeholder="🔍 Поиск...">
                    <select id="typeFilter" class="filter-select">
                        <option value="all">📌 Все</option>
                        <option value="buy">🟢 BUY</option>
                        <option value="sell">🔴 SELL</option>
                    </select>
                </div>
                <div class="timeframe-buttons" id="timeframeButtons">
                    <button class="tf-btn" data-tf="15m">15м</button>
                    <button class="tf-btn active" data-tf="1h">1ч</button>
                    <button class="tf-btn" data-tf="4h">4ч</button>
                    <button class="tf-btn" data-tf="1d">1д</button>
                </div>
                <div class="signals-container" id="signalsContainer">🎯 Загрузка...</div>
            </div>
        </div>
        <div class="footer">🔮 5 индикаторов | 20+ активов | Клик → TradingView | Автоторговля виртуальный портфель</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ========== ГЕНЕРАТОР СИГНАЛОВ ==========
        const symbols = ['BTC/USDT', 'ETH/USDT', 'SOL/USDT', 'XRP/USDT', 'DOGE/USDT', 'EUR/USD', 'GBP/USD', 'AAPL', 'MSFT', 'TSLA', 'NVDA'];
        const prices = { 'BTC/USDT':65234, 'ETH/USDT':3456, 'SOL/USDT':178, 'XRP/USDT':0.62, 'DOGE/USDT':0.15, 'EUR/USD':1.089, 'GBP/USD':1.267, 'AAPL':175.5, 'MSFT':420.7, 'TSLA':175.8, 'NVDA':905 };
        
        function generateSignal(symbol) {
            const rsi = 30 + Math.random() * 60;
            const macd = (Math.random() - 0.5) * 2;
            let score = 0, reasons = [];
            if (rsi < 35) { score += 2; reasons.push('RSI ' + Math.round(rsi)); }
            if (rsi > 65) { score -= 2; reasons.push('RSI ' + Math.round(rsi)); }
            if (macd > 0.3) { score += 1.5; reasons.push('MACD+'); }
            if (macd < -0.3) { score -= 1.5; reasons.push('MACD-'); }
            let action = score >= 2 ? 'buy' : (score <= -2 ? 'sell' : null);
            if (action) {
                return { symbol, action, price: prices[symbol] || 100, strength: Math.min(Math.abs(Math.floor(score)), 5), reasons: reasons.join(', '), rsi: Math.round(rsi), timestamp: new Date().toISOString() };
            }
            return null;
        }
        
        async function scanSignals() {
            let signals = [];
            for (let s of symbols) {
                let sig = generateSignal(s);
                if (sig) signals.push(sig);
            }
            return signals.sort((a,b) => b.strength - a.strength);
        }
        
        // ========== ИСТОРИЯ ==========
        let history = [];
        function addToHistory(s) { history.unshift({...s, id:Date.now()}); if(history.length>200) history.pop(); localStorage.setItem('signals_history', JSON.stringify(history)); }
        function loadHistory() { try { let d = localStorage.getItem('signals_history'); if(d) history = JSON.parse(d); } catch(e){} }
        function getStats() { let total=history.length, wins=history.filter(s=>s.status==='win').length; return {total, wins, rate: total?((wins/(total-wins||1))*100).toFixed(1):0}; }
        loadHistory();
        
        // ========== ОТОБРАЖЕНИЕ ==========
        async function updateUI() {
            let signals = await scanSignals();
            signals.forEach(s => addToHistory(s));
            
            let container = document.getElementById('signalsContainer');
            let html = '';
            for (let s of signals) {
                let stars = '★'.repeat(s.strength) + '☆'.repeat(5-s.strength);
                html += `<div class="signal-card" data-symbol="${s.symbol}" data-action="${s.action}" onclick="window.open('https://www.tradingview.com/chart/?symbol=${s.symbol.includes('/') ? 'BINANCE:'+s.symbol.replace('/','') : 'NASDAQ:'+s.symbol}', '_blank')">
                    <div style="display:flex; justify-content:space-between">
                        <span style="font-weight:bold;">💰 ${s.symbol}</span>
                        <span class="${s.action}" style="font-size:11px;">${s.action === 'buy' ? '🟢 BUY' : '🔴 SELL'}</span>
                        <span style="color:#fa0;">⚡ ${stars}</span>
                    </div>
                    <div style="font-size:11px; color:#aaa; margin-top:8px">💵 $${s.price} | RSI:${s.rsi} | 🎯 ${s.strength}/5</div>
                    <div style="font-size:10px; color:#fa6;">📊 ${s.reasons}</div>
                </div>`;
            }
            let stats = getStats();
            html += `<div style="display:flex; gap:10px; margin-top:15px; justify-content:center">
                <button onclick="showHistory()" style="background:rgba(255,0,255,0.2); border:1px solid #f0f; color:#fff; padding:8px 16px; border-radius:20px; cursor:pointer;">📜 ИСТОРИЯ (${stats.total})</button>
                <button onclick="updateUI()" style="background:rgba(0,255,255,0.2); border:1px solid #0ff; color:#fff; padding:8px 16px; border-radius:20px; cursor:pointer;">🔄 ОБНОВИТЬ</button>
            </div>`;
            container.innerHTML = html;
            document.getElementById('totalSignals').innerText = stats.total;
            document.getElementById('buySignals').innerText = signals.filter(s=>s.action==='buy').length;
            document.getElementById('sellSignals').innerText = signals.filter(s=>s.action==='sell').length;
            document.getElementById('accuracy').innerHTML = stats.rate ? stats.rate+'%' : '—';
        }
        
        function showHistory() {
            let stats = getStats();
            let modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center';
            modal.innerHTML = `<div style="background:#0a0a2e;border:1px solid #f0f;border-radius:20px;width:90%;max-width:500px;max-height:80vh;overflow:auto;padding:20px">
                <h2 style="color:#f0f;">📜 ИСТОРИЯ</h2>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:20px 0">
                    <div style="background:rgba(0,255,255,0.1);padding:10px;border-radius:10px;text-align:center"><div style="font-size:24px;color:#0ff">${stats.total}</div><div>ВСЕГО</div></div>
                    <div style="background:rgba(0,255,255,0.1);padding:10px;border-radius:10px;text-align:center"><div style="font-size:24px;color:#0f8">${stats.wins}</div><div>ВЫИГРЫШИ</div></div>
                    <div style="background:rgba(0,255,255,0.1);padding:10px;border-radius:10px;text-align:center"><div style="font-size:24px;color:#fa0">${stats.rate}%</div><div>ТОЧНОСТЬ</div></div>
                </div>
                ${history.slice(0,30).map(s=>`<div style="padding:10px;border-bottom:1px solid rgba(255,0,255,0.2)"><b>💰 ${s.symbol}</b> <span class="${s.action}" style="font-size:10px">${s.action}</span><br><small>$${s.price} | ${new Date(s.timestamp).toLocaleString()}</small></div>`).join('')}
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top:20px;background:#f0f33;border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer">ЗАКРЫТЬ</button>
            </div>`;
            document.body.appendChild(modal);
        }
        
        // ========== ФИЛЬТРЫ ==========
        function setupFilters() {
            document.getElementById('searchFilter').addEventListener('input', function(e) {
                let term = e.target.value.toLowerCase();
                document.querySelectorAll('.signal-card').forEach(card => {
                    let symbol = card.getAttribute('data-symbol')?.toLowerCase() || '';
                    card.style.display = symbol.includes(term) ? 'block' : 'none';
                });
            });
            document.getElementById('typeFilter').addEventListener('change', function(e) {
                let type = e.target.value;
                document.querySelectorAll('.signal-card').forEach(card => {
                    let action = card.getAttribute('data-action') || '';
                    card.style.display = (type === 'all' || action === type) ? 'block' : 'none';
                });
            });
            document.querySelectorAll('.tf-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    updateUI();
                });
            });
        }
        
        // ========== ВРЕМЯ ==========
        function updateTime() { document.getElementById('liveTime').innerHTML = new Date().toLocaleTimeString('ru-RU'); }
        
        // ========== 3D СЦЕНА ==========
        function init3D() {
            const canvas = document.getElementById('bg-canvas');
            if(!canvas || typeof THREE === 'undefined') return;
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0,0,15);
            const renderer = new THREE.WebGLRenderer({canvas, alpha:false});
            renderer.setSize(window.innerWidth, window.innerHeight);
            const grid = new THREE.GridHelper(30,40,0xf0f,0x0ff);
            grid.position.y = -3;
            scene.add(grid);
            const wire = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(3,3,3)), new THREE.LineBasicMaterial({color:0xf0f}));
            scene.add(wire);
            const pCount = 250;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(pCount*3);
            for(let i=0;i<pCount;i++) { pPos[i*3]=(Math.random()-0.5)*50; pPos[i*3+1]=(Math.random()-0.5)*30; pPos[i*3+2]=(Math.random()-0.5)*30-15; }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
            const parts = new THREE.Points(pGeo, new THREE.PointsMaterial({color:0x0ff, size:0.08}));
            scene.add(parts);
            const light = new THREE.PointLight(0xf0f,0.5,30);
            light.position.set(2,3,4);
            scene.add(light);
            let time=0;
            function animate() { requestAnimationFrame(animate); time+=0.005; wire.rotation.x=time*0.3; wire.rotation.y=time*0.5; parts.rotation.y=time*0.05; renderer.render(scene,camera); }
            animate();
            window.addEventListener('resize', ()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
        }
        
        // ========== СТАРТ ==========
        updateTime();
        setInterval(updateTime, 1000);
        setupFilters();
        init3D();
        updateUI();
        setInterval(updateUI, 30000);
    </script>
</body>
</html>
